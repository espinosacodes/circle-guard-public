# =====================================================================
# CircleGuard - SonarQube Secret skeleton
# =====================================================================
# This file is a SKELETON. Copy it to /tmp/db-secret.yaml, fill in the
# real values, and `kubectl apply` it. DO NOT commit the populated copy.
#
# It bundles three Secrets the SonarQube Helm release consumes:
#   - sonarqube-db          : Postgres credentials
#   - sonarqube-admin       : initial admin password (rotated post-install)
#   - sonarqube-monitoring  : passcode used by the Prometheus exporter
# =====================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-db
  namespace: sonarqube
type: Opaque
stringData:
  # MUST match jdbcSecretUsernameKey / jdbcSecretPasswordKey in values.yaml
  SONAR_JDBC_USERNAME: "REPLACE_ME"
  SONAR_JDBC_PASSWORD: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-admin
  namespace: sonarqube
type: Opaque
stringData:
  # Chart reads `password` by default — change immediately after first login.
  password: "REPLACE_ME_strong_password_here"
---
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-monitoring
  namespace: sonarqube
type: Opaque
stringData:
  # Used by Prometheus to authenticate against /api/monitoring/metrics.
  passcode: "REPLACE_ME_random_32_chars"
