spring:
  application:
    name: circleguard-file-service

# Placeholder for S3/MinIO configuration if needed later
# aws:
#   s3:
#     endpoint: http://localhost:9000
#     access-key: minioadmin
#     secret-key: minioadmin

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
    propagation:
      type: b3,w3c
  otlp:
    tracing:
      endpoint: ${OTLP_TRACES_ENDPOINT:http://jaeger-collector.observability:4318/v1/traces}
