spring:
  application:
    name: circleguard-dashboard-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_dashboard
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8084

# --- Req 3.b: Feature toggles (configuration pattern) ---
# Bound to com.circleguard.dashboard.config.FeatureToggles.
# Override per environment via the K8s ConfigMap in
# k8s/<env>/dashboard-service-feature-toggles.yaml (env vars
# FEATURES_GRAPHQL_ENDPOINT_ENABLED, FEATURES_HOTSPOT_MAP_ENABLED, ...).
features:
  graphql-endpoint-enabled: false
  hotspot-map-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,configprops
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
    propagation:
      type: b3,w3c
  otlp:
    tracing:
      endpoint: ${OTLP_TRACES_ENDPOINT:http://jaeger-collector.observability:4318/v1/traces}
