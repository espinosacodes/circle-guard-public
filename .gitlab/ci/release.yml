# =====================================================================
# CircleGuard - Release (semantic-release + RELEASE_NOTES)
# =====================================================================
# Runs after a successful deploy:prod (manual). semantic-release reads
# Conventional-Commit messages, bumps the version, creates a Git tag,
# and (optionally) writes a CHANGELOG.
#
# We also call scripts/generate-release-notes.sh to keep the
# Change-Management-compliant RELEASE_NOTES_<version>.md file the
# Jenkinsfile.master pipeline already produced.
# =====================================================================

release:semantic:
  stage: release
  image: node:lts
  needs:
    - job: deploy:prod
      artifacts: false
  variables:
    # GL_TOKEN is a Project Access Token with `api` + `write_repository`.
    GL_TOKEN: "${GITLAB_RELEASE_TOKEN}"
    GITHUB_TOKEN: "${GITLAB_RELEASE_TOKEN}" # semantic-release reads either
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - git config --global user.email "ci@circleguard.local"
    - git config --global user.name  "CircleGuard CI"
    - git remote set-url origin "https://oauth2:${GL_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - npm install -g semantic-release@22
        @semantic-release/changelog@6
        @semantic-release/git@10
        @semantic-release/gitlab@13
        @semantic-release/exec@6
  script:
    # 1) Let semantic-release figure out the next version + create the tag.
    - npx semantic-release --branches main,master
    # 2) Read the version it wrote (semantic-release stores it as a tag).
    - NEW_VERSION="$(git describe --tags --abbrev=0)"
    - echo "${NEW_VERSION}" > .release-version
    - PREV_TAG="$(git describe --tags --abbrev=0 ${NEW_VERSION}^ 2>/dev/null || echo '')"
    # 3) Generate the Change-Management RELEASE_NOTES_<version>.md
    - bash scripts/generate-release-notes.sh "${NEW_VERSION}" "${PREV_TAG}" "${CI_COMMIT_SHORT_SHA}" > "RELEASE_NOTES_${NEW_VERSION}.md"
    - echo "Generated RELEASE_NOTES_${NEW_VERSION}.md for version ${NEW_VERSION}"
  artifacts:
    expire_in: 1 year
    paths:
      - .release-version
      - RELEASE_NOTES_*.md
      - CHANGELOG.md
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: on_success
    - if: '$CI_COMMIT_TAG'
      when: never
