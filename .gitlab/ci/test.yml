# =====================================================================
# CircleGuard - Test Stage
# =====================================================================
# Two jobs:
#   - test:unit          — `./gradlew test` (JaCoCo finalizer fires)
#   - test:integration   — `./gradlew integrationTest` (if task exists)
#
# Both jobs publish JUnit XML so GitLab renders a Test Report tab,
# and JaCoCo XML/HTML so the quality stage (Sonar) can pick up coverage.
# =====================================================================

.test_base:
  image: eclipse-temurin:21-jdk
  before_script:
    - chmod +x ./gradlew
  cache:
    key:
      files:
        - build.gradle.kts
        - settings.gradle.kts
    paths:
      - .gradle/caches
      - .gradle/wrapper
    policy: pull
  needs:
    - job: build:all
      optional: true
      artifacts: true

test:unit:
  stage: test
  extends: .test_base
  script:
    - ./gradlew test jacocoTestReport --no-daemon --parallel --build-cache
    # Aggregate per-service JaCoCo XMLs into one summary path expected by Sonar.
    - mkdir -p build/reports/jacoco/aggregate
    - find services -path "*/build/reports/jacoco/test/jacocoTestReport.xml" -print
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit:
        - services/*/build/test-results/test/*.xml
      coverage_report:
        coverage_format: jacoco
        path: services/*/build/reports/jacoco/test/jacocoTestReport.xml
    paths:
      - services/*/build/reports/jacoco/**/*
      - services/*/build/reports/tests/**/*
      - services/*/build/test-results/**/*
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

test:integration:
  stage: test
  extends: .test_base
  # Integration test task is optional on some services — `|| true` mirrors
  # the same behaviour as Jenkinsfile.dev "Integration Tests" stage.
  script:
    - ./gradlew integrationTest --no-daemon --parallel || echo "integrationTest task not present on every service"
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit:
        - services/*/build/test-results/integrationTest/*.xml
    paths:
      - services/*/build/reports/integrationTest/**/*
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
