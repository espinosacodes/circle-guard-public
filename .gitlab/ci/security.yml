# =====================================================================
# CircleGuard - Security Stage (Trivy)
# =====================================================================
# Two complementary scans:
#   - security:fs      scans the source tree + Gradle deps (pre-build).
#   - security:image   scans the pushed container images (post-package).
#
# Both fail the pipeline on HIGH/CRITICAL findings (exit-code 1) and
# upload SARIF + GitLab Container Scanning JSON for the Vulnerability tab.
# =====================================================================

.trivy_base:
  image:
    name: aquasec/trivy:0.50.0
    entrypoint: [""]
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: "${CI_PROJECT_DIR}/.trivycache"
    TRIVY_EXIT_CODE: "1"
    TRIVY_SEVERITY: "HIGH,CRITICAL"
  cache:
    key: "trivy-${CI_COMMIT_REF_SLUG}"
    paths:
      - .trivycache

# ---------------------------------------------------------------------
# Filesystem scan — runs early to catch vulnerable Gradle deps + secrets.
# ---------------------------------------------------------------------
security:fs:
  stage: security
  extends: .trivy_base
  script:
    - trivy --version
    # Download DB once, reuse for both scans
    - trivy fs --download-db-only
    # SARIF for code-quality integrations
    - trivy fs --format sarif --output trivy-fs.sarif --severity ${TRIVY_SEVERITY} --exit-code 0 .
    # JSON for the GitLab Vulnerability Report
    - trivy fs --format template --template "@/contrib/gitlab.tpl" --output gl-dependency-scanning-report.json --severity ${TRIVY_SEVERITY} --exit-code 0 .
    # Final pass: fails the pipeline if HIGH/CRITICAL found
    - trivy fs --severity ${TRIVY_SEVERITY} --exit-code ${TRIVY_EXIT_CODE} --ignore-unfixed .
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trivy-fs.sarif
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ---------------------------------------------------------------------
# Image scan — runs after `package` (needs the pushed images). One slot
# per service. Pulls from Artifact Registry with the same SA used to push.
# ---------------------------------------------------------------------
security:image:
  stage: security
  extends: .trivy_base
  needs:
    - job: package:image
      optional: true
  parallel:
    matrix:
      - SERVICE:
          - auth-service
          - dashboard-service
          - file-service
          - form-service
          - gateway-service
          - identity-service
          - notification-service
          - promotion-service
  variables:
    IMAGE: "${AR_REPO}/${SERVICE}:${IMAGE_TAG}"
  before_script:
    # Auth so Trivy can pull from Artifact Registry
    - mkdir -p ~/.docker
    - echo "${GCP_SA_KEY}" > /tmp/sa.json
    - |
      cat > ~/.docker/config.json <<JSON
      { "credHelpers": { "${GCP_AR_REGION}-docker.pkg.dev": "gcloud" } }
      JSON
  script:
    - trivy image --format sarif --output trivy-image-${SERVICE}.sarif --severity ${TRIVY_SEVERITY} --exit-code 0 ${IMAGE}
    - trivy image --format template --template "@/contrib/gitlab.tpl" --output gl-container-scanning-report-${SERVICE}.json --severity ${TRIVY_SEVERITY} --exit-code 0 ${IMAGE}
    - trivy image --severity ${TRIVY_SEVERITY} --exit-code ${TRIVY_EXIT_CODE} --ignore-unfixed ${IMAGE}
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trivy-image-*.sarif
    reports:
      container_scanning: gl-container-scanning-report-*.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'

# =====================================================================
# CG-018: SBOM Generation (syft -> CycloneDX)
# =====================================================================
# One SBOM per pushed container image. Runs after `package:image`, in
# parallel per service (matrix). The CycloneDX JSON is uploaded both as
# a regular artifact AND as `cyclonedx` report so GitLab's Dependency
# List / Vulnerability tab consume it natively.
#
# Retention: 90 days as a GitLab artifact; long-term storage handled
# out-of-band (GCS bucket) — see docs/SBOM.md.
# =====================================================================
sbom:
  stage: security
  image:
    name: anchore/syft:v1.8.0
    entrypoint: [""]
  needs:
    - job: package:image
      optional: true
  parallel:
    matrix:
      - SERVICE:
          - auth-service
          - dashboard-service
          - file-service
          - form-service
          - gateway-service
          - identity-service
          - notification-service
          - promotion-service
  variables:
    IMAGE: "${AR_REPO}/${SERVICE}:${IMAGE_TAG}"
    SBOM_DIR: "sbom"
  before_script:
    # Auth so syft can pull from Artifact Registry (mirrors security:image)
    - mkdir -p ~/.docker
    - echo "${GCP_SA_KEY}" > /tmp/sa.json
    - |
      cat > ~/.docker/config.json <<JSON
      { "credHelpers": { "${GCP_AR_REGION}-docker.pkg.dev": "gcloud" } }
      JSON
    - mkdir -p "${SBOM_DIR}"
  script:
    # Generate CycloneDX JSON (GitLab native format)
    - |
      syft "${IMAGE}" \
        -o cyclonedx-json="${SBOM_DIR}/${SERVICE}-${IMAGE_TAG}.cdx.json"
    # Also produce a human-readable SPDX table (used in incident response)
    - |
      syft "${IMAGE}" \
        -o spdx-json="${SBOM_DIR}/${SERVICE}-${IMAGE_TAG}.spdx.json" \
        -o table="${SBOM_DIR}/${SERVICE}-${IMAGE_TAG}.txt"
    # Quick sanity grep so a missing dependency tree fails the job
    - |
      grep -q '"bomFormat":"CycloneDX"' "${SBOM_DIR}/${SERVICE}-${IMAGE_TAG}.cdx.json"
  artifacts:
    when: always
    expire_in: 90 days
    paths:
      - sbom/*.json
      - sbom/*.txt
    reports:
      # GitLab consumes the CycloneDX file into the Dependency List page
      cyclonedx: "sbom/${SERVICE}-${IMAGE_TAG}.cdx.json"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
