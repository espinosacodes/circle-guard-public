# =====================================================================
# CircleGuard - OWASP ZAP Baseline Scan (post deploy-stage)
# =====================================================================
# Runs `zap-baseline.py` against the stage gateway with the tuned
# configuration in `.zap/`. This is a passive scan only (safe to run
# against shared envs).
#
# Behaviour:
#   - .zap/baseline.conf   defines auth + scan flags + alert handling
#   - .zap/context.xml     scopes the scan + injects the bearer token
#   - .zap/rules.tsv       escalates OWASP Top 10 rules to HIGH so they
#                          fail the build (anything below HIGH is a warn)
#
# Required CI/CD variables:
#   ZAP_TARGET_URL    e.g. https://stage.circleguard.example.com
#   ZAP_AUTH_TOKEN    short-lived bearer token, scope=baseline-scan
#
# Reports uploaded as GitLab artifacts AND attached to the GitLab
# Security Dashboard via the `sast` / `dast` reports types.
# =====================================================================

zap:baseline:
  stage: zap
  image:
    name: ghcr.io/zaproxy/zaproxy:stable
    entrypoint: [""]
  needs:
    - job: deploy:stage
      artifacts: false
  variables:
    ZAP_HTML_REPORT: "zap-report.html"
    ZAP_JSON_REPORT: "zap-report.json"
    ZAP_MD_REPORT:   "zap-report.md"
  before_script:
    # Substitute ${ZAP_TARGET_URL} / ${ZAP_AUTH_TOKEN} in the context
    # file so ZAP sees concrete values. envsubst is already in the image.
    - apt-get update -qq && apt-get install -y -qq gettext-base curl
    - mkdir -p /zap/wrk
    - envsubst < .zap/context.xml > /zap/wrk/context.xml
    - cp .zap/baseline.conf /zap/wrk/baseline.conf
    - cp .zap/rules.tsv     /zap/wrk/rules.tsv
    # Sanity check — bail early if the target isn't reachable; saves the
    # 10-minute spider warm-up before failing.
    - |
      curl -fsS -o /dev/null -w 'Reachability: %{http_code}\n' "${ZAP_TARGET_URL}/actuator/health" || true
  script:
    # `-l HIGH` => only HIGH alerts cause non-zero exit (driven by rules.tsv)
    # `-c`      => baseline config
    # `-t`      => context XML (must be a URL or filesystem path inside /zap/wrk)
    # `-r/-w/-J` => HTML / Markdown / JSON reports
    # `-z`      => extra CLI args forwarded to ZAP (escape with single quotes)
    - |
      zap-baseline.py \
        -t "${ZAP_TARGET_URL}" \
        -n /zap/wrk/context.xml \
        -c baseline.conf \
        -r ${ZAP_HTML_REPORT} \
        -w ${ZAP_MD_REPORT} \
        -J ${ZAP_JSON_REPORT} \
        -l HIGH \
        -T 10 \
        -m 2 \
        -j \
        -z "-configfile /zap/wrk/baseline.conf -rulefile /zap/wrk/rules.tsv"
    - cp /zap/wrk/${ZAP_HTML_REPORT} . 2>/dev/null || true
    - cp /zap/wrk/${ZAP_JSON_REPORT} . 2>/dev/null || true
    - cp /zap/wrk/${ZAP_MD_REPORT}   . 2>/dev/null || true
  artifacts:
    when: always
    expire_in: 1 month
    paths:
      - zap-report.html
      - zap-report.json
      - zap-report.md
    reports:
      # Surface findings in the GitLab Security Dashboard. The DAST
      # report format consumes the JSON output natively.
      dast: zap-report.json
  # `allow_failure: false` — a HIGH OWASP Top 10 finding now blocks the
  # promotion to production. Override per-MR via `zap:baseline:allow_failure`.
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
