# =====================================================================
# CircleGuard - Quality Stage (SonarQube)
# =====================================================================
# Uses the official sonar-scanner-cli image. Coverage is consumed from
# JaCoCo XML artifacts uploaded by the test stage.
#
# Sonar settings live in sonar-project.properties at repo root.
# Required CI/CD variables:
#   - SONAR_HOST_URL   (e.g. https://sonarcloud.io or https://sonar.example.com)
#   - SONAR_TOKEN      (masked + protected — issued in Sonar UI)
# =====================================================================

sonarqube:check:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:5.0
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0" # Sonar needs full history for SCM blame
  cache:
    key: "sonar-${CI_COMMIT_REF_SLUG}"
    paths:
      - .sonar/cache
  needs:
    - job: test:unit
      artifacts: true
  script:
    # Pass branch / MR context to Sonar so it shows analyses per branch.
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        SONAR_ARGS="-Dsonar.pullrequest.key=${CI_MERGE_REQUEST_IID} \
                   -Dsonar.pullrequest.branch=${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME} \
                   -Dsonar.pullrequest.base=${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
      else
        SONAR_ARGS="-Dsonar.branch.name=${CI_COMMIT_REF_NAME}"
      fi
    - sonar-scanner
        -Dsonar.host.url="${SONAR_HOST_URL}"
        -Dsonar.token="${SONAR_TOKEN}"
        -Dsonar.qualitygate.wait=true
        ${SONAR_ARGS}
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
