# =====================================================================
# CircleGuard - Deploy Stages (GKE)
# =====================================================================
# Three jobs, one per environment:
#   - deploy:dev      (auto on develop)            -> circleguard-dev
#   - deploy:stage    (auto on release/* branches) -> circleguard-stage
#   - deploy:prod     (manual on main tags)        -> circleguard-master
#
# Each job uses a kubectl image, authenticates to the target GKE cluster
# via the KUBE_CONFIG_<ENV> CI/CD variable (base64-encoded kubeconfig),
# then applies the manifests from k8s/<env>/.
# =====================================================================

.kubectl_base:
  image:
    name: bitnami/kubectl:1.29
    entrypoint: [""]
  variables:
    KUBECONFIG: "${CI_PROJECT_DIR}/.kube/config"
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.kube"
    - echo "${KUBE_CONFIG}" | base64 -d > "${KUBECONFIG}"
    - chmod 600 "${KUBECONFIG}"
    - kubectl version --client=true
    - kubectl cluster-info

# Helper to roll out all services in a namespace. Uses `set image` so
# pods pick up the SHA-tagged image we just pushed in `package:image`.
.deploy_steps: &deploy_steps
  - kubectl apply -f k8s/${ENV_DIR}/namespace.yml
  - kubectl create configmap postgres-init --from-file=init-db.sql=init-db.sql
      --namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -
  - kubectl apply -f k8s/${ENV_DIR}/infrastructure.yml
  - kubectl apply -f k8s/${ENV_DIR}/services.yml
  - |
    for svc in auth-service identity-service form-service promotion-service \
               notification-service gateway-service dashboard-service file-service; do
      if kubectl -n ${NAMESPACE} get deployment ${svc} >/dev/null 2>&1; then
        kubectl -n ${NAMESPACE} set image deployment/${svc} \
            ${svc}=${AR_REPO}/${svc}:${IMAGE_TAG} --record || true
      fi
    done
  - kubectl rollout restart deployment -n ${NAMESPACE}
  - kubectl rollout status deployment -n ${NAMESPACE} --timeout=300s
  - kubectl get pods,svc -n ${NAMESPACE}

# ---------------------------------------------------------------------
# DEV — auto on develop branch
# ---------------------------------------------------------------------
deploy:dev:
  stage: deploy-dev
  extends: .kubectl_base
  variables:
    ENV_DIR: "dev"
    NAMESPACE: "${K8S_NS_DEV}"
    KUBE_CONFIG: "${KUBE_CONFIG_DEV}"
  environment:
    name: dev
    url: https://dev.circleguard.example.com
    deployment_tier: development
  needs:
    - job: package:image
      artifacts: false
    - job: security:image
      artifacts: false
  script: *deploy_steps
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ---------------------------------------------------------------------
# STAGE — auto on release/* branches
# ---------------------------------------------------------------------
deploy:stage:
  stage: deploy-stage
  extends: .kubectl_base
  variables:
    ENV_DIR: "stage"
    NAMESPACE: "${K8S_NS_STAGE}"
    KUBE_CONFIG: "${KUBE_CONFIG_STAGE}"
  environment:
    name: stage
    url: https://stage.circleguard.example.com
    deployment_tier: staging
  needs:
    - job: package:image
      artifacts: false
    - job: security:image
      artifacts: false
  script: *deploy_steps
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

# ---------------------------------------------------------------------
# PROD — manual approval on main tags. Environment protected in GitLab
# (only release managers can press play).
# ---------------------------------------------------------------------
deploy:prod:
  stage: deploy-prod
  extends: .kubectl_base
  variables:
    ENV_DIR: "master"
    NAMESPACE: "${K8S_NS_PROD}"
    KUBE_CONFIG: "${KUBE_CONFIG_PROD}"
  environment:
    name: production
    url: https://app.circleguard.example.com
    deployment_tier: production
    action: start
  needs:
    - job: deploy:stage
      artifacts: false
    - job: e2e:stage
      artifacts: false
    - job: zap:baseline
      artifacts: false
  when: manual
  allow_failure: false
  script: *deploy_steps
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
