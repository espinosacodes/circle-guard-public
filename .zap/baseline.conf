# =====================================================================
# CircleGuard - OWASP ZAP baseline scan configuration
# =====================================================================
# Consumed by `.gitlab/ci/zap.yml` as `zap-baseline.py -c .zap/baseline.conf`.
# Only documents alert handling + scan flags; the target URL and context
# live in `.zap/context.xml`, and per-rule severity bumps live in
# `.zap/rules.tsv`.
#
# Required CI variables (set in GitLab UI):
#   ZAP_TARGET_URL    Stage gateway base URL (e.g. https://stage.circleguard.example.com)
#   ZAP_AUTH_TOKEN    Service-account bearer token, scope=baseline-scan
#
# Failure policy: alerts whose rule appears below as `FAIL` will exit
# zap-baseline.py with code 1, which fails the CI job. Everything else
# is downgraded to WARN (visible in the report, doesn't break the build).
# =====================================================================

# ---------------------------------------------------------------------
# Global scan flags (mirrored in CI for visibility — kept here so a
# developer running the scan locally gets the same behaviour).
# ---------------------------------------------------------------------
# -T 10          max scan minutes
# -m 2           spider warm-up minutes
# -d             show debug
# -I             (DO NOT pass — we want non-zero exit on FAIL rules)
# -j             ajax spider on (needed for the React admin SPA)
# -c <conf>      this file
# -t <ctx.xml>   context with auth
# -r report.html / -w report.md / -J report.json
DEFAULT_SCAN_FLAGS="-T 10 -m 2 -j -d"

# ---------------------------------------------------------------------
# Authentication. zap-baseline.py picks up these env vars and injects
# them into the context. The token is short-lived (24 h) and rotated
# weekly by the CI variable rotation playbook.
# ---------------------------------------------------------------------
AUTH_METHOD=bearer
AUTH_HEADER_NAME=Authorization
AUTH_HEADER_VALUE=Bearer ${ZAP_AUTH_TOKEN}

# ---------------------------------------------------------------------
# URL exclusions. /actuator/health* is hit by k8s probes every 5 s and
# would otherwise dominate the alert volume with "Information Disclosure
# - Sensitive Information in URL" false positives.
# ---------------------------------------------------------------------
EXCLUDE_URLS=(
    "^.*/actuator/health.*$"
    "^.*/actuator/info$"
    "^.*/actuator/prometheus$"
    "^.*/swagger-ui.*$"      # API docs are intentionally exposed
    "^.*/v3/api-docs.*$"
)

# ---------------------------------------------------------------------
# Per-alert severity overrides. Anything tagged FAIL forces a non-zero
# exit. Anything tagged WARN appears in the report only.
#
# Rule IDs reference the OWASP ZAP rule catalogue:
#   https://www.zaproxy.org/docs/alerts/
# =====================================================================
# CRITICAL (always fail the build):
#   40018  SQL Injection
#   40012  Cross Site Scripting (Reflected)
#   40014  Cross Site Scripting (Persistent)
#   40016  Cross Site Scripting (Persistent - Prime)
#   40017  Cross Site Scripting (Persistent - Spider)
#   10202  Absence of Anti-CSRF Tokens
#   90017  XSLT Injection
#   10103  Image Exposes Location Information via EXIF Data (admin upload paths)
#   10031  User Controllable HTML Element Attribute (Potential XSS)
#   10202  Absence of Anti-CSRF Tokens
#   10038  Content Security Policy (CSP) Header Not Set
#   10095  Backup File Disclosure
#   90033  Loosely Scoped Cookie
#
# WEAK TLS:
#   10054  Cookie Without Secure Flag
#   90004  Insufficient Site Isolation Against Spectre Vulnerability
#   10105  Weak Authentication Method (HTTP basic over plain HTTP)
#
# EXPOSED ADMIN ENDPOINTS:
#   10024  Information Disclosure - Sensitive Information in URL  (when path matches /admin)
#   30001  Buffer Overflow                                        (admin upload endpoints)
# ---------------------------------------------------------------------
FAIL_RULES=(
    40018   # SQL Injection
    40012   # XSS (Reflected)
    40014   # XSS (Persistent)
    40016   # XSS (Persistent - Prime)
    40017   # XSS (Persistent - Spider)
    10202   # CSRF token missing
    90017   # XSLT Injection
    10038   # CSP not set
    10095   # Backup File Disclosure
    90033   # Loosely Scoped Cookie
    10054   # Cookie without Secure flag (TLS-related)
    10105   # Weak authentication method
    10024   # Sensitive info in URL (admin paths)
)

# Rules we want to surface but NOT block on (low-confidence checks).
WARN_RULES=(
    10015   # Incomplete or No Cache-control Header
    10027   # Information Disclosure - Suspicious Comments
    10049   # Storable and Cacheable Content
    10096   # Timestamp Disclosure
)

# Rules we explicitly ignore (validated false positives for our stack).
IGNORE_RULES=(
    10049   # We deliberately allow caching of static admin assets
)
