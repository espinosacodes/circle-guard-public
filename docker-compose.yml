version: '3.8'

services:
  # ========================
  # Infrastructure
  # ========================
  postgres:
    image: postgres:16
    container_name: circleguard-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: circleguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d circleguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26
    container_name: circleguard-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: circleguard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: circleguard-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: circleguard-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openldap:
    image: osixia/openldap:1.5.0
    container_name: circleguard-ldap
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: "CircleGuard"
      LDAP_DOMAIN: "circleguard.edu"
      LDAP_ADMIN_PASSWORD: "admin"

  # ========================
  # Microservices
  # ========================
  auth-service:
    image: circleguard/auth-service:latest
    container_name: circleguard-auth-service
    build:
      context: ./services/circleguard-auth-service
      dockerfile: Dockerfile
    ports:
      - "8180:8180"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_auth
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_LDAP_URLS: ldap://openldap:389
      SPRING_LDAP_BASE: dc=circleguard,dc=edu
      SPRING_LDAP_USERNAME: cn=admin,dc=circleguard,dc=edu
      SPRING_LDAP_PASSWORD: admin
      JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
      QR_SECRET: "my-qr-secret-key-for-dev-1234567890"
      IDENTITY_SERVICE_URL: http://identity-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      openldap:
        condition: service_started

  identity-service:
    image: circleguard/identity-service:latest
    container_name: circleguard-identity-service
    build:
      context: ./services/circleguard-identity-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_identity
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      VAULT_SECRET: "746573742d7365637265742d33322d63686172732d6c6f6e672d313233343536"
      VAULT_SALT: "deadbeef"
      VAULT_HASH_SALT: "12345678"
      JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
    depends_on:
      postgres:
        condition: service_healthy

  form-service:
    image: circleguard/form-service:latest
    container_name: circleguard-form-service
    build:
      context: ./services/circleguard-form-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_form
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  promotion-service:
    image: circleguard/promotion-service:latest
    container_name: circleguard-promotion-service
    build:
      context: ./services/circleguard-promotion-service
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_promotion
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_USERNAME: neo4j
      SPRING_NEO4J_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    image: circleguard/notification-service:latest
    container_name: circleguard-notification-service
    build:
      context: ./services/circleguard-notification-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTH_API_URL: http://auth-service:8180
      JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
      QR_SECRET: "my-qr-secret-key-for-dev-1234567890"
    depends_on:
      kafka:
        condition: service_healthy

  gateway-service:
    image: circleguard/gateway-service:latest
    container_name: circleguard-gateway-service
    build:
      context: ./services/circleguard-gateway-service
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
      QR_SECRET: "my-qr-secret-key-for-dev-1234567890"
    depends_on:
      redis:
        condition: service_healthy

  dashboard-service:
    image: circleguard/dashboard-service:latest
    container_name: circleguard-dashboard-service
    build:
      context: ./services/circleguard-dashboard-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_dashboard
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  neo4jdata:
