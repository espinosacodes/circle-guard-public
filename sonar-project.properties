# =====================================================================
# CircleGuard - SonarCloud Project Configuration
# =====================================================================
# Consumed by sonarsource/sonar-scanner-cli in .gitlab/ci/quality.yml.
# Analysis is hosted on SonarCloud (free for public projects) — no
# self-hosted infra to operate. See docs/SONARCLOUD_SETUP.md for the
# one-time onboarding steps.
# =====================================================================

sonar.host.url=https://sonarcloud.io
sonar.organization=espinosacodes
sonar.projectKey=espinosacodes_circle-guard-final
sonar.projectName=CircleGuard
sonar.projectVersion=1.0

sonar.sources=services/circleguard-auth-service/src/main,services/circleguard-dashboard-service/src/main,services/circleguard-file-service/src/main,services/circleguard-form-service/src/main,services/circleguard-gateway-service/src/main,services/circleguard-identity-service/src/main,services/circleguard-notification-service/src/main,services/circleguard-promotion-service/src/main
sonar.tests=services/circleguard-auth-service/src/test,services/circleguard-dashboard-service/src/test,services/circleguard-file-service/src/test,services/circleguard-form-service/src/test,services/circleguard-gateway-service/src/test,services/circleguard-identity-service/src/test,services/circleguard-notification-service/src/test,services/circleguard-promotion-service/src/test
sonar.java.binaries=services/circleguard-auth-service/build/classes,services/circleguard-dashboard-service/build/classes,services/circleguard-file-service/build/classes,services/circleguard-form-service/build/classes,services/circleguard-gateway-service/build/classes,services/circleguard-identity-service/build/classes,services/circleguard-notification-service/build/classes,services/circleguard-promotion-service/build/classes
sonar.coverage.jacoco.xmlReportPaths=services/circleguard-auth-service/build/reports/jacoco/test/jacocoTestReport.xml,services/circleguard-dashboard-service/build/reports/jacoco/test/jacocoTestReport.xml,services/circleguard-file-service/build/reports/jacoco/test/jacocoTestReport.xml,services/circleguard-form-service/build/reports/jacoco/test/jacocoTestReport.xml,services/circleguard-gateway-service/build/reports/jacoco/test/jacocoTestReport.xml,services/circleguard-identity-service/build/reports/jacoco/test/jacocoTestReport.xml,services/circleguard-notification-service/build/reports/jacoco/test/jacocoTestReport.xml,services/circleguard-promotion-service/build/reports/jacoco/test/jacocoTestReport.xml

sonar.java.source=21
sonar.sourceEncoding=UTF-8

# Exclude generated / non-source paths
sonar.exclusions=**/build/**,**/generated/**,mobile/**,tests/**,infra/**
