# =====================================================================
# CircleGuard - SonarQube Project Configuration
# =====================================================================
# Consumed by sonarsource/sonar-scanner-cli in .gitlab/ci/quality.yml.
# Each microservice is declared as a Sonar "module" so the dashboard
# shows per-service quality + coverage.
# =====================================================================

sonar.projectKey=circleguard
sonar.projectName=CircleGuard
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8
sonar.sources=src/main/java,src/main/kotlin
sonar.tests=src/test/java,src/test/kotlin
sonar.java.binaries=build/classes
sonar.java.libraries=build/libs/*.jar
sonar.junit.reportPaths=build/test-results/test
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Exclude generated / non-source paths
sonar.exclusions=**/build/**,**/generated/**,**/*.gradle.kts,**/Jenkinsfile*,**/k8s/**,**/scripts/**,**/tests/**

# Pull-request decoration handled via -Dsonar.pullrequest.* args in CI

# ---------------------------------------------------------------------
# Modules — one per microservice. Each module overrides `sources`,
# `tests`, `java.binaries` and `coverage.jacoco.xmlReportPaths` so the
# aggregate analysis works without copying files around.
# ---------------------------------------------------------------------
sonar.modules=auth,dashboard,file,form,gateway,identity,notification,promotion

auth.sonar.projectName=auth-service
auth.sonar.projectBaseDir=services/circleguard-auth-service

dashboard.sonar.projectName=dashboard-service
dashboard.sonar.projectBaseDir=services/circleguard-dashboard-service

file.sonar.projectName=file-service
file.sonar.projectBaseDir=services/circleguard-file-service

form.sonar.projectName=form-service
form.sonar.projectBaseDir=services/circleguard-form-service

gateway.sonar.projectName=gateway-service
gateway.sonar.projectBaseDir=services/circleguard-gateway-service

identity.sonar.projectName=identity-service
identity.sonar.projectBaseDir=services/circleguard-identity-service

notification.sonar.projectName=notification-service
notification.sonar.projectBaseDir=services/circleguard-notification-service

promotion.sonar.projectName=promotion-service
promotion.sonar.projectBaseDir=services/circleguard-promotion-service
