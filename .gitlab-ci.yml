# =====================================================================
# CircleGuard - GitLab CI/CD Parent Pipeline
# =====================================================================
# Monorepo CI/CD for 8 Spring Boot microservices.
# Pipelines reuse Jenkinsfile-equivalent logic (see Jenkinsfile.dev,
# Jenkinsfile.stage, Jenkinsfile.master) but use:
#   - GitLab DAG (`needs:`) for parallelism
#   - rules:changes for per-service builds (only touched services run)
#   - Kaniko for rootless container build (no DinD)
#   - GKE clusters via kubectl + kustomize
#   - Sonar / Trivy / OWASP ZAP for quality + security gates
# =====================================================================

# ---------------------------------------------------------------------
# Default image: a Temurin JDK 21 base for Gradle work; per-job images
# override this where needed (Kaniko, Sonar, Trivy, ZAP, kubectl ...).
# ---------------------------------------------------------------------
default:
  image: eclipse-temurin:21-jdk
  interruptible: true
  # No `tags:` — let GitLab's shared SaaS runners (saas-linux-small-amd64)
  # pick up jobs. The original `tags: [docker]` matched a private runner
  # convention from the Jenkinsfile era; on gitlab.com SaaS that tag isn't
  # registered, so all jobs got `stuck_pending_no_matching_runners`.
  # Per-job overrides still work — heavy build jobs can opt into
  # saas-linux-medium-amd64 with `tags: [saas-linux-medium-amd64]`.

# ---------------------------------------------------------------------
# Stages run sequentially; jobs within a stage run in parallel.
# `notify` is a "sink" stage that runs on_failure of any prior stage.
# ---------------------------------------------------------------------
stages:
  - build
  - test
  - quality
  - security         # source/dependency scans (Trivy fs, secrets)
  - package          # Kaniko build + push to Artifact Registry
  - security-image   # image-level scans + SBOM (need pushed images, so post-package)
  - deploy-dev
  - deploy-stage
  - e2e
  - perf
  - zap
  - deploy-prod
  - release
  - notify

# ---------------------------------------------------------------------
# Global variables. Values that depend on the GitLab project go through
# CI/CD variables (see docs/CI_CD.md "Required variables").
# ---------------------------------------------------------------------
variables:
  # Gradle
  GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx2g"
  # Container registry — set GCP_AR_REGION + GCP_PROJECT in CI variables
  AR_REPO: "${GCP_AR_REGION}-docker.pkg.dev/${GCP_PROJECT}/circleguard"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  # K8s namespaces (kept consistent with k8s/<env> and Jenkinsfiles)
  K8S_NS_DEV: "circleguard-dev"
  K8S_NS_STAGE: "circleguard-stage"
  K8S_NS_PROD: "circleguard-master"
  # Workflow defaults
  FF_USE_FASTZIP: "true"
  GIT_DEPTH: "20"

# ---------------------------------------------------------------------
# Workflow rules: avoid duplicate pipelines for branch + MR events.
# ---------------------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ---------------------------------------------------------------------
# Cache Gradle deps keyed by the lockfile-equivalent (build.gradle.kts).
# Restored before every Java job; uploaded once at end of `build`.
# ---------------------------------------------------------------------
.cache_gradle: &cache_gradle
  cache:
    key:
      files:
        - build.gradle.kts
        - settings.gradle.kts
    paths:
      - .gradle/caches
      - .gradle/wrapper
    policy: pull

# ---------------------------------------------------------------------
# Shared rule fragments for per-service `rules:changes` filtering.
# Each per-service job extends one of these. The "global" rule fires
# the job on default-branch commits and tags so that a full rebuild
# happens at release time regardless of which paths changed.
# ---------------------------------------------------------------------
.service_changes_auth: &service_changes_auth
  - changes:
      - services/circleguard-auth-service/**/*
      - build.gradle.kts
      - settings.gradle.kts
      - .gitlab/ci/**/*
      - .gitlab-ci.yml
  - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_TAG'

# ---------------------------------------------------------------------
# Include per-stage templates. Order matters only for readability;
# GitLab merges them all into one effective pipeline.
# ---------------------------------------------------------------------
include:
  - local: '.gitlab/ci/build.yml'
  - local: '.gitlab/ci/test.yml'
  - local: '.gitlab/ci/quality.yml'
  - local: '.gitlab/ci/security.yml'
  - local: '.gitlab/ci/package.yml'
  - local: '.gitlab/ci/deploy.yml'
  - local: '.gitlab/ci/e2e.yml'
  - local: '.gitlab/ci/perf.yml'
  - local: '.gitlab/ci/zap.yml'
  - local: '.gitlab/ci/release.yml'
  - local: '.gitlab/ci/notify.yml'
