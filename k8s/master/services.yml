---
# ========================
# ConfigMap - Shared Configuration
# ========================
apiVersion: v1
kind: ConfigMap
metadata:
  name: circleguard-config
  namespace: circleguard-master
data:
  SPRING_DATASOURCE_USERNAME: "admin"
  SPRING_DATASOURCE_PASSWORD: "password"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  SPRING_NEO4J_URI: "bolt://neo4j:7687"
  SPRING_NEO4J_USERNAME: "neo4j"
  SPRING_NEO4J_PASSWORD: "password"
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_LDAP_URLS: "ldap://openldap:389"
  SPRING_LDAP_BASE: "dc=circleguard,dc=edu"
  SPRING_LDAP_USERNAME: "cn=admin,dc=circleguard,dc=edu"
  SPRING_LDAP_PASSWORD: "admin"
  JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
  QR_SECRET: "my-qr-secret-key-for-dev-1234567890"
  VAULT_SECRET: "746573742d7365637265742d33322d63686172732d6c6f6e672d313233343536"
  VAULT_SALT: "deadbeef"
  VAULT_HASH_SALT: "12345678"
---
# ========================
# Auth Service (port 8180)
# ========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: circleguard-master
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: circleguard/auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8180
          envFrom:
            - configMapRef:
                name: circleguard-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/circleguard_auth"
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-service:8083"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: circleguard-master
spec:
  selector:
    app: auth-service
  ports:
    - port: 8180
      targetPort: 8180
  type: ClusterIP
---
