---
# Feature toggles for dashboard-service in STAGE.
# See k8s/dev/dashboard-service-feature-toggles.yaml for usage notes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-service-feature-toggles
  namespace: circleguard-stage
  labels:
    app: dashboard-service
    component: feature-toggles
    env: stage
data:
  # STAGE: GraphQL still hidden until QA signs off.
  FEATURES_GRAPHQL_ENDPOINT_ENABLED: "false"
  FEATURES_HOTSPOT_MAP_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: circleguard-stage
spec:
  template:
    spec:
      containers:
        - name: dashboard-service
          envFrom:
            - configMapRef:
                name: dashboard-service-feature-toggles
